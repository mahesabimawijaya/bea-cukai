name: CI/CD Next.js Docker Hub

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            mahesawijaya/bea-cukai:${{ github.sha }}
            mahesawijaya/bea-cukai:latest
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
            JIRA_USERNAME=${{ secrets.JIRA_USERNAME }}
            JIRA_PASSWORD=${{ secrets.JIRA_PASSWORD }}
            TELE_BOT_TOKEN=${{ secrets.TELE_BOT_TOKEN }}
            TELE_GROUP_ID=${{ secrets.TELE_GROUP_ID }}

  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            docker pull mahesawijaya/bea-cukai:latest

            docker stop bea-cukai || true
            docker rm bea-cukai || true

            docker run -d \
            --name bea-cukai \
            --restart unless-stopped \
            -p 3002:3002 \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
            -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            -e JIRA_BASE_URL="${{ secrets.JIRA_BASE_URL }}" \
            -e JIRA_USERNAME="${{ secrets.JIRA_USERNAME }}" \
            -e JIRA_PASSWORD="${{ secrets.JIRA_PASSWORD }}" \
            -e TELE_BOT_TOKEN="${{ secrets.TELE_BOT_TOKEN }}" \
            -e TELE_GROUP_ID="${{ secrets.TELE_GROUP_ID }}" \
            -e PORT=3002 \
            mahesawijaya/bea-cukai:latest
